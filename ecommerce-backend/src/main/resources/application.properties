# Application name
spring.application.name=EcommerceBackend

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:ecommerce_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically create database tables from entities
spring.jpa.hibernate.ddl-auto=create

# Delays running data.sql until after Hibernate has created the tables
spring.jpa.defer-datasource-initialization=true

# Show SQL statements in console
spring.jpa.show-sql=true

# Enable H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
